services:
  - type: web
    name: zorvyn
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: zorvyn-db
          property: connectionString

databases:
  - name: zorvyn-db
    databaseName: zorvyn
    user: zorvyn
    plan: free
    region: oregon
